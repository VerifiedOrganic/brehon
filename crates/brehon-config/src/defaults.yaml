review:
  policy:
    min_average_score: 7
    min_individual_score: 6
    blocking_score: 5
    min_approvals: 2
    require_blocking_feedback_resolution: true
    max_review_rounds: 3
  timeout_minutes: 30
  auto_assign: true
  default_reviewers:
    - claude-reviewer
    - codex-reviewer
    - gemini-reviewer
  panel_mode: full_council
  lease_mode: exclusive
  panels:
    - id: primary
      reviewers:
        - claude-reviewer
        - codex-reviewer
        - gemini-reviewer
  max_diff_tokens: 8000
  chunk_strategy: ByDirectory
  stale_detection:
    enabled: true
    ignore_files:
      - Cargo.lock
      - package-lock.json
      - .gitignore
    strategy: DeltaReview

supervisor:
  autonomy: Guided
  heartbeat_minutes: 15
  stuck_detection:
    time_threshold_minutes: 10
    operation_aware: true
    pattern_detection: true
  nudge:
    soft_after_minutes: 5
    guidance_after_minutes: 10

orchestration:
  max_active_workers: 5
  worktree_isolation: true
  branch_prefix: "brehon/"
  auto_cleanup_worktrees: true
  worker_idle_behavior: SelfImprove
  allow_mutating_idle_work: false
  self_improve_tasks:
    - run_tests
    - lint_check
    - collect_review_notes
  # spawn_workers: null  # Override total spawned workers; if null, uses sum of pool.min

runtime:
  enabled_workflows: []
  retry:
    enabled: true
    max_attempts: 2
    base_delay_ms: 10000
    max_delay_ms: 60000
    jitter_ms: 250
  continuation:
    enabled: true
    max_turns_per_run: 5
    idle_prompt_after_secs: 300
  terminal_host:
    kind: embedded
    preview_pane: false
    pane_ownership: mux

escalation:
  human_in_loop: true
  notify_via: Terminal
  escalation_timeout_minutes: 15

budget:
  max_total_cost: null
  max_cost_per_task: null
  max_tokens_per_agent: null
  alert_threshold_percent: 80
  enforcement: Soft

context:
  db_path: ".brehon/brehon.db"
  search_index_path: ".brehon/indexes/tantivy"
  memory_ttl_days: null
  max_memories: 10000
  agents_md: Auto
  retrieval:
    default_limit: 5
    max_limit: 20
    snippet_chars: 240
  compression:
    enabled: false
    mode: deterministic_terse
    store_raw: true
    compact_memories: true
    compact_rules: true
    compact_tasks: true

tui:
  default_layout: Balanced
  terminal_mode: Auto
  notifications:
    toast_duration_seconds: 5
    flash_tabs: true
    modal_on_critical: true
  keybindings: default

retention:
  max_events: 100000
  idempotency_ttl_hours: 168
  max_completed_tasks: 10000
  max_assignment_history: 1000
  max_tasks: 10000
  sweep_interval_secs: 60

security:
  sandbox_profile: OsDefault
  persist_transcripts: true
  redact_patterns: []
  env_allowlist:
    - PATH
    - HOME
    - USER
    - SHELL

permissions:
  "*": Ask
  bash:
    "*": Ask
    "git *": Allow
    "cargo test *": Allow
    "rm -rf *": Deny
  edit:
    "*": Allow
