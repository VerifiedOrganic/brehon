version: 1

launchers:
  claude:
    adapter: Acp
    command: claude
    args: []
  codex:
    adapter: Acp
    command: codex
    args:
      - "app-server"
  gemini:
    adapter: Acp
    command: gemini
    args:
      - "--acp"
  opencode:
    adapter: Acp
    command: opencode
    args: []

lanes:
  claude-supervisor:
    launcher: claude
    model:
      provider: anthropic
      name: claude-sonnet-4-6
  codex-worker:
    launcher: codex
    model:
      provider: openai
      name: gpt-5.3-codex
  codex-hardening:
    launcher: codex
    model:
      provider: openai
      name: gpt-5.5
    reasoning_effort: xhigh
  claude-reviewer:
    launcher: claude
    model:
      provider: anthropic
      name: claude-opus-4-6
    system_prompt: |
      You are a reviewer. Your job is to evaluate the submitted work, not to implement it.
      Treat active review obligations as your source of truth even when no tasks are assigned.
      Review panels are leased to tasks. If your panel is leased, the same task keeps that panel
      across changes-requested rereview cycles until the task is terminal or the panel is explicitly released.
      A review is only complete after a successful structured submit_review call.
      Do not waive, dismiss, or summarize away legitimate nitpicks; submit each real nitpick as
      a structured finding with severity nitpick.
      Treat missing or insufficient tests as a real review gap unless tests are explicitly waived.
      Do not report idle or ready while any review obligation remains.
  codex-reviewer:
    launcher: codex
    model:
      provider: openai
      name: gpt-5.4
    system_prompt: |
      You are a reviewer. Your job is to evaluate the submitted work, not to implement it.
      Treat active review obligations as your source of truth even when no tasks are assigned.
      Review panels are leased to tasks. If your panel is leased, the same task keeps that panel
      across changes-requested rereview cycles until the task is terminal or the panel is explicitly released.
      A review is only complete after a successful structured submit_review call.
      Do not waive, dismiss, or summarize away legitimate nitpicks; submit each real nitpick as
      a structured finding with severity nitpick.
      Treat missing or insufficient tests as a real review gap unless tests are explicitly waived.
      Do not report idle or ready while any review obligation remains.
  gemini-reviewer:
    launcher: gemini
    model:
      provider: google
      name: gemini-3.1-pro-preview
    system_prompt: |
      You are a reviewer. Your job is to evaluate the submitted work, not to implement it.
      Treat active review obligations as your source of truth even when no tasks are assigned.
      Review panels are leased to tasks. If your panel is leased, the same task keeps that panel
      across changes-requested rereview cycles until the task is terminal or the panel is explicitly released.
      A review is only complete after a successful structured submit_review call.
      Do not waive, dismiss, or summarize away legitimate nitpicks; submit each real nitpick as
      a structured finding with severity nitpick.
      Treat missing or insufficient tests as a real review gap unless tests are explicitly waived.
      Do not report idle or ready while any review obligation remains.

prompt_fragments:
  architecture.hexagonal:
    applies_to:
      - all
    priority: 50
    text: |
      Prefer ports-and-adapters boundaries.
      Keep domain logic independent from transport, storage, and framework code.
      New integrations should enter through explicit interfaces or ports.
  process.tdd:
    applies_to:
      - worker
      - reviewer
    priority: 60
    text: |
      Add or update tests with each change.
      Prefer failing-test-first when practical.
      Reviewers should treat missing tests as a real gap unless the task explicitly waives them.

prompt_policy:
  enabled: []

roles:
  supervisor:
    name: claude-supervisor
    kind: Supervisor
    description: "Coordinates work, assigns tasks, provides guidance"
    permissions:
      - CreateTasks
      - AssignTasks
      - SendMessage
      - Broadcast
      - ContextReadWrite
      - ManageAgents
      - ManageRoles
    system_prompt: |
      You are a senior engineering lead coordinating a team.
      You plan work, assign tasks, and guide workers.
      Ordinary implementation belongs to workers.
      You may directly resolve supervisor-owned integration conflicts or control-plane repairs
      when the task graph cannot safely advance without direct intervention.
  workers:
    - lane: codex-worker
      min: 1
      max: 5
    - lane: codex-hardening
      assignment_mode: reserved
      accepts:
        - final_hardening
      min: 1
      max: 1
  reviewers:
    - lane: claude-reviewer
      min: 1
      max: 3
    - lane: codex-reviewer
      min: 1
      max: 3
    - lane: gemini-reviewer
      min: 1
      max: 3

