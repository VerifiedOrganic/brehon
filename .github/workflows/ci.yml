name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  ZIG_VERSION: "0.15.2"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-and-check:
    name: Clippy + check (${{ matrix.os }})
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Zig
        shell: bash
        run: bash .github/scripts/install-zig.sh

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: clippy-and-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        shell: bash
        run: bash .github/scripts/install-zig.sh

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Unit tests
        run: cargo test --workspace --lib

      - name: Integration tests
        run: cargo test --workspace --test '*' -- --test-threads=1

  guards:
    name: Repo guard checks
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Dependency boundaries
        run: ./scripts/check-dependency-boundaries.sh
      - name: File size guard
        run: ./scripts/check-file-size.sh
