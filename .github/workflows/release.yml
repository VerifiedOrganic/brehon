name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). The tag must already exist."
        required: true
        type: string

permissions:
  contents: write  # required to create the GitHub Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  ZIG_VERSION: "0.15.2"
  BIN_PRIMARY: brehon
  BIN_AGENT: brehon-native-agent

jobs:
  # ---------------------------------------------------------------------------
  # Resolve the version/tag once, then fan out to per-target builds.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG (version $VERSION)"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "${TAG}" --draft --title "${TAG}" --generate-notes
          fi

  # ---------------------------------------------------------------------------
  # Build release binaries natively on each target's matching runner.
  # Cross-compiling fails for ghostty_vt_sys because its Zig build script
  # produces a static lib for the host triple — so we use native runners.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-26-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          # Windows is currently unsupported (Zig build + PTY stack not validated
          # on MSVC). Uncomment when ready:
          # - target: x86_64-pc-windows-msvc
          #   runner: windows-latest
          #   archive: zip

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        shell: bash
        run: bash .github/scripts/install-zig.sh

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --package brehon-cli \
            --package brehon-native-agent

      - name: Stage release archive
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NAME="brehon-${VERSION}-${TARGET}"
          STAGE="dist/${NAME}"
          mkdir -p "${STAGE}"

          EXT=""
          if [[ "${TARGET}" == *windows* ]]; then EXT=".exe"; fi

          cp "target/${TARGET}/release/${BIN_PRIMARY}${EXT}" "${STAGE}/"
          cp "target/${TARGET}/release/${BIN_AGENT}${EXT}"   "${STAGE}/"
          cp LICENSE README.md "${STAGE}/" || true

          cd dist
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            ARCHIVE="${NAME}.zip"
            7z a -tzip "${ARCHIVE}" "${NAME}" >/dev/null
          else
            ARCHIVE="${NAME}.tar.gz"
            tar -czf "${ARCHIVE}" "${NAME}"
          fi

          # SHA256 alongside the archive
          if command -v shasum >/dev/null; then
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          echo "archive=dist/${ARCHIVE}"        >> "$GITHUB_OUTPUT"
          echo "sha=dist/${ARCHIVE}.sha256"     >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"                   >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload \
            "${{ needs.prepare.outputs.tag }}" \
            "${{ steps.stage.outputs.archive }}" \
            "${{ steps.stage.outputs.sha }}" \
            --clobber

  # ---------------------------------------------------------------------------
  # Collect every per-target archive into a single GitHub Release.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish checksum manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Generate combined checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ needs.prepare.outputs.tag }}" --repo "${{ github.repository }}" --pattern "*.sha256" --dir dist
          cd dist
          # Per-file .sha256 files were created on the build runners; concatenate
          # them into one SHASUMS256.txt for convenience.
          : > SHASUMS256.txt
          for f in *.sha256; do
            cat "$f" >> SHASUMS256.txt
          done
          ls -la

      - name: Upload checksum manifest
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ needs.prepare.outputs.tag }}" dist/SHASUMS256.txt --repo "${{ github.repository }}" --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release edit "${{ needs.prepare.outputs.tag }}" --repo "${{ github.repository }}" --draft=false
