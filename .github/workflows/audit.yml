name: Audit

on:
  schedule:
    # Mondays 06:00 UTC. Pinned to a weekly cadence so transient advisories
    # don't churn CI on every PR; on-demand runs are available via dispatch.
    - cron: "0 6 * * 1"
  push:
    paths:
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # rustsec/audit-check opens an issue when a new advisory lands
  checks: write  # required to post advisory annotations as a check run

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
