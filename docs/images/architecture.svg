<svg width="1000" height="750" viewBox="0 0 1000 750" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F8FAFC"/>
  
  <defs>
    <!-- Shadows -->
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-md" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-cli" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="grad-orchestrator" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="grad-supervisor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="grad-mcp" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0369A1" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="grad-mux" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F766E" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <linearGradient id="grad-review" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    
    <!-- Arrowhead -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8" />
    </marker>
  </defs>

  <!-- Header Section -->
  <g transform="translate(50, 40)">
    <path d="M0,10 Q0,0 10,0 L120,0 Q130,0 130,10 L130,50 Q130,60 120,60 L10,60 Q0,60 0,50 Z" fill="#1E293B" />
    <text x="65" y="38" fill="white" font-weight="bold" font-size="28" text-anchor="middle">BREHON</text>
    <text x="145" y="35" fill="#64748B" font-size="16" font-weight="500">Project Architecture</text>
  </g>

  <!-- CLI Layer -->
  <g transform="translate(300, 120)" filter="url(#shadow-md)">
    <rect width="400" height="70" rx="12" fill="url(#grad-cli)" />
    <rect x="20" y="20" width="30" height="30" rx="6" fill="#475569" />
    <text x="35" y="42" fill="white" font-size="20" text-anchor="middle" font-family="monospace">&gt;_</text>
    <text x="70" y="38" fill="white" font-weight="bold" font-size="22">brehon-cli (TUI)</text>
    <text x="70" y="58" fill="#94A3B8" font-size="13">Terminal User Interface &amp; Live Dashboard</text>
  </g>

  <!-- Main Core Layer -->
  <!-- Orchestrator -->
  <g transform="translate(75, 260)" filter="url(#shadow-md)">
    <rect width="260" height="130" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" />
    <path d="M0,16 Q0,0 16,0 L244,0 Q260,0 260,16 L260,40 L0,40 Z" fill="url(#grad-orchestrator)" />
    <text x="130" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">Orchestrator</text>
    <text x="130" y="65" fill="#1E293B" font-weight="600" font-size="14" text-anchor="middle">Workflow Management</text>
    <text x="130" y="85" fill="#64748B" font-size="12" text-anchor="middle">Task Board &amp; DAG Tracking</text>
    <text x="130" y="105" fill="#64748B" font-size="12" text-anchor="middle">Worker Pool Reconciler</text>
  </g>

  <!-- Supervisor -->
  <g transform="translate(370, 260)" filter="url(#shadow-md)">
    <rect width="260" height="130" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" />
    <path d="M0,16 Q0,0 16,0 L244,0 Q260,0 260,16 L260,40 L0,40 Z" fill="url(#grad-supervisor)" />
    <text x="130" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">Supervisor</text>
    <text x="130" y="65" fill="#1E293B" font-weight="600" font-size="14" text-anchor="middle">Task Monitoring</text>
    <text x="130" y="85" fill="#64748B" font-size="12" text-anchor="middle">Event-Store Reader</text>
    <text x="130" y="105" fill="#64748B" font-size="12" text-anchor="middle">AI-Assisted Guardrails</text>
  </g>

  <!-- MCP Server -->
  <g transform="translate(665, 260)" filter="url(#shadow-md)">
    <rect width="260" height="130" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" />
    <path d="M0,16 Q0,0 16,0 L244,0 Q260,0 260,16 L260,40 L0,40 Z" fill="url(#grad-mcp)" />
    <text x="130" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">MCP Server</text>
    <text x="130" y="65" fill="#1E293B" font-weight="600" font-size="14" text-anchor="middle">Tool Infrastructure</text>
    <text x="130" y="85" fill="#64748B" font-size="12" text-anchor="middle">50+ Tools for Agent Context</text>
    <text x="130" y="105" fill="#64748B" font-size="12" text-anchor="middle">Skills &amp; Knowledge Retrieval</text>
  </g>

  <!-- Operational Layer -->
  <!-- Mux -->
  <g transform="translate(200, 460)" filter="url(#shadow-md)">
    <rect width="260" height="110" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" />
    <path d="M0,16 Q0,0 16,0 L244,0 Q260,0 260,16 L260,40 L0,40 Z" fill="url(#grad-mux)" />
    <text x="130" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">Mux (PTY Multiplexer)</text>
    <text x="130" y="65" fill="#1E293B" font-weight="600" font-size="14" text-anchor="middle">Terminal Management</text>
    <text x="130" y="85" fill="#64748B" font-size="12" text-anchor="middle">ghostty_vt + ratatui</text>
  </g>

  <!-- Review Panel -->
  <g transform="translate(540, 460)" filter="url(#shadow-md)">
    <rect width="260" height="110" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1" />
    <path d="M0,16 Q0,0 16,0 L244,0 Q260,0 260,16 L260,40 L0,40 Z" fill="url(#grad-review)" />
    <text x="130" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">Reviewer Panel</text>
    <text x="130" y="65" fill="#1E293B" font-weight="600" font-size="14" text-anchor="middle">Output Validation</text>
    <text x="130" y="85" fill="#64748B" font-size="12" text-anchor="middle">Independent Agent Scoring</text>
  </g>

  <!-- Connections -->
  <!-- CLI to Core -->
  <path d="M500,190 V220 H205 V260" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M500,190 V220 H500 V260" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M500,190 V220 H795 V260" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Core to Operational -->
  <path d="M205,390 V425 H330 V460" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M500,390 V425 H330 V460" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M500,390 V425 H670 V460" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M795,390 V425 H670 V460" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Mux <-> Reviewer -->
  <path d="M460,515 H540" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4" />
  <text x="500" y="510" fill="#64748B" font-size="11" text-anchor="middle">PTY / Worktree</text>

  <!-- Agent Layer -->
  <g transform="translate(100, 630)">
    <!-- Claude -->
    <g transform="translate(0, 0)">
      <rect width="160" height="70" rx="12" fill="white" stroke="#E2E8F0" filter="url(#shadow-sm)" />
      <rect x="10" y="15" width="40" height="40" rx="8" fill="#FDE6D2" />
      <text x="30" y="42" fill="#D97706" font-weight="bold" font-size="20" text-anchor="middle">A</text>
      <text x="60" y="35" fill="#1E293B" font-weight="bold" font-size="16">Claude</text>
      <text x="60" y="52" fill="#64748B" font-size="10">Anthropic</text>
    </g>
    <!-- Codex -->
    <g transform="translate(195, 0)">
      <rect width="160" height="70" rx="12" fill="white" stroke="#E2E8F0" filter="url(#shadow-sm)" />
      <rect x="10" y="15" width="40" height="40" rx="8" fill="#DBEAFE" />
      <text x="30" y="42" fill="#2563EB" font-weight="bold" font-size="20" text-anchor="middle">&lt;/&gt;</text>
      <text x="60" y="35" fill="#1E293B" font-weight="bold" font-size="16">Codex</text>
      <text x="60" y="52" fill="#64748B" font-size="10">OpenAI</text>
    </g>
    <!-- Gemini -->
    <g transform="translate(390, 0)">
      <rect width="160" height="70" rx="12" fill="white" stroke="#E2E8F0" filter="url(#shadow-sm)" />
      <rect x="10" y="15" width="40" height="40" rx="8" fill="#ECFDF5" />
      <text x="30" y="42" fill="#059669" font-weight="bold" font-size="20" text-anchor="middle">G</text>
      <text x="60" y="35" fill="#1E293B" font-weight="bold" font-size="16">Gemini</text>
      <text x="60" y="52" fill="#64748B" font-size="10">Google</text>
    </g>
    <!-- Kimi -->
    <g transform="translate(585, 0)">
      <rect width="160" height="70" rx="12" fill="white" stroke="#E2E8F0" filter="url(#shadow-sm)" />
      <rect x="10" y="15" width="40" height="40" rx="8" fill="#FDF2F8" />
      <text x="30" y="42" fill="#DB2777" font-weight="bold" font-size="20" text-anchor="middle">K</text>
      <text x="60" y="35" fill="#1E293B" font-weight="bold" font-size="16">Kimi</text>
      <text x="60" y="52" fill="#64748B" font-size="10">Moonshot</text>
    </g>
    <!-- Others -->
    <g transform="translate(780, 0)">
      <rect width="160" height="70" rx="12" fill="white" stroke="#E2E8F0" filter="url(#shadow-sm)" />
      <rect x="10" y="15" width="40" height="40" rx="8" fill="#F1F5F9" />
      <text x="30" y="42" fill="#475569" font-weight="bold" font-size="20" text-anchor="middle">+</text>
      <text x="60" y="35" fill="#1E293B" font-weight="bold" font-size="16">Others</text>
      <text x="60" y="52" fill="#64748B" font-size="10">Adapters...</text>
    </g>
  </g>

  <!-- Connecting Mux to Agents -->
  <path d="M330,570 V600 H180 V630" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M330,570 V600 H375 V630" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M330,570 V600 H570 V630" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M330,570 V600 H765 V630" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M330,570 V600 H960 V630" fill="none" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" />

</svg>
