<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, sans-serif">
  <rect width="100%" height="100%" fill="#F8FAFC"/>
  
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <linearGradient id="grad-core" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="grad-adapters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orientation="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B" />
    </marker>
  </defs>

  <!-- CLI Entry Point -->
  <g transform="translate(300, 40)" filter="url(#shadow)">
    <rect width="200" height="60" rx="12" fill="#1E293B" />
    <text x="100" y="38" fill="white" font-weight="bold" font-size="18" text-anchor="middle">brehon-cli</text>
    <text x="100" y="54" fill="#94A3B8" font-size="11" text-anchor="middle">(Entry Point)</text>
  </g>

  <path d="M400,100 V140" stroke="#CBD5E1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Core Section -->
  <g transform="translate(80, 160)" filter="url(#shadow)">
    <rect width="300" height="280" rx="16" fill="white" stroke="#E2E8F0" />
    <path d="M0,16 Q0,0 16,0 L284,0 Q300,0 300,16 L300,40 L0,40 Z" fill="url(#grad-core)" />
    <text x="150" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">CORE</text>
    
    <g transform="translate(20, 60)" font-size="13" fill="#1E293B">
      <text y="0" font-weight="bold">Crates (Domain + Ports)</text>
      <text y="25" fill="#64748B">• brehon-types</text>
      <text y="45" fill="#64748B">• brehon-ports (Traits)</text>
      <text y="65" fill="#64748B">• brehon-config</text>
      <text y="85" fill="#64748B">• brehon-orchestrator</text>
      <text y="105" fill="#64748B">• brehon-supervisor</text>
      <text y="125" fill="#64748B">• brehon-review</text>
      <text y="145" fill="#64748B">• brehon-policy</text>
      <text y="165" fill="#64748B">• brehon-workflow</text>
      <text y="185" font-style="italic" fill="#94A3B8">...and more</text>
    </g>
  </g>

  <!-- Dependency Arrow -->
  <g transform="translate(390, 280)">
    <path d="M0,0 H40" stroke="#64748B" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
    <text x="20" y="-10" fill="#64748B" font-size="10" text-anchor="middle">depends only</text>
    <text x="20" y="25" fill="#64748B" font-size="10" text-anchor="middle">on traits</text>
  </g>

  <!-- Adapters Section -->
  <g transform="translate(450, 160)" filter="url(#shadow)">
    <rect width="300" height="280" rx="16" fill="white" stroke="#E2E8F0" />
    <path d="M0,16 Q0,0 16,0 L284,0 Q300,0 300,16 L300,40 L0,40 Z" fill="url(#grad-adapters)" />
    <text x="150" y="27" fill="white" font-weight="bold" font-size="18" text-anchor="middle">ADAPTERS</text>
    
    <g transform="translate(20, 60)" font-size="13" fill="#1E293B">
      <text y="0" font-weight="bold">Implementations</text>
      <text y="25" fill="#64748B">• brehon-store-fjall</text>
      <text y="45" fill="#64748B">• brehon-search-tantivy</text>
      <text y="65" fill="#64748B">• brehon-git</text>
      <text y="85" fill="#64748B">• brehon-acp / brehon-mcp</text>
      <text y="105" fill="#64748B">• brehon-mux / brehon-pty</text>
      <text y="125" fill="#64748B">• brehon-tui</text>
      <text y="145" fill="#64748B">• brehon-adapter-claude / codex</text>
      <text y="165" fill="#64748B">• brehon-adapter-gemini / etc.</text>
    </g>
  </g>

  <!-- Label -->
  <text x="400" y="480" fill="#94A3B8" font-size="12" text-anchor="middle">Hexagonal Architecture (Ports &amp; Adapters)</text>
</svg>
